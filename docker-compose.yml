services:
  # PHP + Apache (Váš projekt)
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./www:/var/www/html
    depends_on:
      - db

  # MySQL Databáza
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fitness_tracker
    ports:
      - "3306:3306"
    volumes:
      - ./www/sql/databaza.sql:/docker-entrypoint-initdb.d/databaza.sql
      - db_data:/var/lib/mysql

  # phpMyAdmin - Vizualizácia DB
  phpmyadmin:
    image: phpmyadmin:latest
    restart: always
    ports:
      - "8081:80"
    environment:
      - PMA_HOST=db
      - PMA_USER=root
      - PMA_PASSWORD=root
    depends_on:
      - db

volumes:
  db_data: